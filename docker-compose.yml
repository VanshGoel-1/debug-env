version: '3.8'

services:
  debug-env:
    build: .
    ports:
      - "8000:7860"
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    networks:
      - debug_env_network

networks:
  debug_env_network:
    driver: bridge
